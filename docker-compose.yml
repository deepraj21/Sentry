services:
  mongo:
    image: mongo:7
    container_name: sentry-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: sentry-app
    ports:
      - "4020:4020"
    environment:
      PORT: "4020"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      DEFAULT_MODEL: "${DEFAULT_MODEL}"
      MONGODB_URI: "mongodb://mongo:27017/sentry"
      JWT_SECRET: "${JWT_SECRET}"
      GITHUB_BOT_TOKEN: "${GITHUB_BOT_TOKEN}"
      GITHUB_APP_ID: "${GITHUB_APP_ID}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY}"
    depends_on:
      - mongo

volumes:
  mongo_data:

